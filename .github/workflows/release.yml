name: Release

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Preflight
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
      ref: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - id: version
        name: Auto-increment version from git tags
        shell: bash
        run: |
          # Get the latest tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Remove 'v' prefix and split version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Increment patch: 0.0.1 → 0.0.2 → ... → 0.0.99 → 0.1.0
          PATCH=$((PATCH + 1))
          if [ $PATCH -gt 99 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
            if [ $MINOR -gt 99 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "New version: $NEW_VERSION ($NEW_TAG)"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    if: needs.preflight.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: core -> core/target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Stamp version
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const conf = JSON.parse(fs.readFileSync('core/tauri.conf.json', 'utf8'));
            conf.version = process.env.VERSION;
            fs.writeFileSync('core/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            let cargo = fs.readFileSync('core/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + process.env.VERSION + '\"');
            fs.writeFileSync('core/Cargo.toml', cargo);
          "

      - name: Build Tauri app
        run: TAURI_DIR=core bun run tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create and sign updater tarball
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          BUNDLE_DIR="core/target/${{ matrix.target }}/release/bundle/macos"
          TARBALL="Codrift_${VERSION}_aarch64.app.tar.gz"
          pushd "$BUNDLE_DIR"
          tar -czf "$TARBALL" Codrift.app
          popd
          TAURI_DIR=core bun run tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "${BUNDLE_DIR}/${TARBALL}"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find core/target/${{ matrix.target }}/release/bundle \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) \
            -exec cp {} release-assets/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [preflight, build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ needs.preflight.outputs.tag }}
          git push origin ${{ needs.preflight.outputs.tag }} --force

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Generate updater manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bun scripts/merge-updater-manifests.mjs \
            release-assets \
            ${{ needs.preflight.outputs.version }} \
            ${{ needs.preflight.outputs.tag }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: Codrift ${{ needs.preflight.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
          files: |
            release-assets/*.dmg
            release-assets/*.app.tar.gz
            release-assets/*.app.tar.gz.sig
            release-assets/latest.json
          fail_on_unmatched_files: false

  finalize:
    name: Bump versions
    needs: [preflight, release]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version strings
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const conf = JSON.parse(fs.readFileSync('core/tauri.conf.json', 'utf8'));
            conf.version = process.env.VERSION;
            fs.writeFileSync('core/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            let cargo = fs.readFileSync('core/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + process.env.VERSION + '\"');
            fs.writeFileSync('core/Cargo.toml', cargo);
          "

      - name: Commit and push
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- package.json core/tauri.conf.json core/Cargo.toml; then
            echo "Versions already up to date."
            exit 0
          fi
          git add package.json core/tauri.conf.json core/Cargo.toml
          git commit -m "chore(release): bump versions to $RELEASE_TAG"
          git push origin HEAD:main
