<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caret</title>
    <script>
      (function () {
        var stored = localStorage.getItem("caret-theme");
        var resolved = stored === "light" ? "light" : stored === "system" ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light") : "dark";
        document.documentElement.classList.add(resolved);
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/ui/main.tsx"></script>
  </body>
</html>
