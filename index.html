<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blink</title>
    <!-- Preload JetBrains Mono so it's available before any terminal opens.
         rel=preload forces the browser to fetch it at startup, and
         document.fonts.ready in TerminalInstance waits for it to be usable. -->
    <link
      rel="preload"
      href="/fonts/JetBrainsMono-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/JetBrainsMono-Bold.ttf"
      as="font"
      type="font/ttf"
      crossorigin="anonymous"
    />
    <script>
      (function () {
        var stored = localStorage.getItem("blink-theme");
        var resolved =
          stored === "light"
            ? "light"
            : stored === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : "dark";
        document.documentElement.classList.add(resolved);
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
  </head>
  <body spellcheck="false" autocorrect="off" autocapitalize="off">
    <div id="root"></div>
    <script type="module" src="/ui/main.tsx"></script>
  </body>
</html>
